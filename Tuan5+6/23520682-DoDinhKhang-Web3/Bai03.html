<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Định dạng văn bản</title>
  <link rel="icon" type="image/x-icon" href=".\images\Bai03.ico">
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Arial, sans-serif;
      background-color: white;
      color: black;
      line-height: 1.6;
      padding: 40px 100px;
    }

    h1 {
      text-align: center;
      color: #00CC00;
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    p {
      font-size: 20px;
      margin: 10px 0;
    }

    .subject {
      font-weight: bold;
      text-decoration: underline;
    }

    .chemistry {
      font-style: italic;
    }

    .chemistry .formula {
      color: red;
      font-style: normal;
    }

    .math {
      font-style: italic;
    }

    .math .formula {
      color: red;
      font-style: normal;
    }

    .cs {
      font-style: italic;
    }

    pre {
      background-color: #d3d3d3;
      padding: 15px;
      font-family: "Courier New", monospace;
      font-size: 16px;
      color: blue;
      padding: 15px 20px 15px 80px;
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 20px 15px;
      }
      h1 {
        font-size: 26px;
        margin-bottom: 30px;
      }
      p {
        font-size: 16px;
        margin: 15px 0;
      }
      pre {
        font-size: 13px;
        padding: 15px 10px 15px 30px;
        overflow-x: auto;
      }
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 15px 10px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 25px;
      }
      p {
        font-size: 14px;
        margin: 12px 0;
        line-height: 1.8;
      }
      pre {
        font-size: 11px;
        padding: 12px 8px 12px 20px;
        overflow-x: auto;
        line-height: 1.6;
      }
    }

    @media screen and (max-width: 360px) {
      body {
        padding: 10px 8px;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }
      p {
        font-size: 13px;
      }
      pre {
        font-size: 10px;
        padding: 10px 5px 10px 15px;
      }
    }
  </style>
</head>
<body>
  <h1>Định dạng văn bản</h1>

  <p>
    <span class="subject">Hóa học:</span>
    <span class="chemistry">
      Nước: <span class="formula">H<sub>2</sub>O</span>;
      Axit Sunfuric: <span class="formula">H<sub>2</sub>SO<sub>4</sub></span>
    </span>
  </p>

  <p>
    <span class="subject">Toán học:</span>
    <span class="math">
      Phương trình bậc 2:
      <span class="formula">ax<sup>2</sup> + bx + c = 0</span>
    </span>
  </p>

  <p>
    <span class="subject">Tin học:</span>
    <span class="cs">Vòng lặp for:</span>
  </p>

  <pre>
int tong = 0;

for(int i = 1; i <= 10; i++)
    
  tong += i;

printf("Tong cac so tu 1 => 10 la: %d\n",tong);
  </pre>

</body>
</html>
