<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ</title>
    <link rel="stylesheet" href="styles/lienhe.css">
    <link rel="icon" type="image/x-icon" href=".\images\lienhe.ico">
</head>
<body>
    <div class="container">
        <h1>Liên hệ với tui</h1>
        <p>Vui lòng điền thông tin vào form dưới đây để liên hệ với tui.</p>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name">Họ và tên <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Nhập họ và tên của bạn">
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" name="phone" placeholder="0123456789">
            </div>

            <div class="form-group">
                <label for="subject">Tiêu đề <span class="required">*</span></label>
                <input type="text" id="subject" name="subject" required placeholder="Nhập tiêu đề">
            </div>

            <div class="form-group">
                <label for="message">Nội dung <span class="required">*</span></label>
                <textarea id="message" name="message" rows="6" required placeholder="Nhập nội dung tin nhắn của bạn..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="submit-btn">Gửi tin nhắn</button>
            </div>
        </form>

        <div class="contact-info">
            <h2>Thông tin liên hệ</h2>
            <div class="info-item">
                <strong>Địa chỉ:</strong>
                <p>181 ấp Long Thanh, Xã Long Trạch, tỉnh Tây Ninh</p>
            </div>
            <div class="info-item">
                <strong>Email:</strong>
                <p>23520682@gm.uit.edu.vn</p>
            </div>
            <div class="info-item">
                <strong>Điện thoại:</strong>
                <p>0789 751 700</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            if (name && email && message) {
                alert('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi sớm nhất có thể.');
                this.reset();
            }
        });
    </script>
</body>
</html>
