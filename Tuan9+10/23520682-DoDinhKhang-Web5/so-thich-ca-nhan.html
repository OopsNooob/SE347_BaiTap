<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sở Thích Cá Nhân</title>
    <link rel="icon" type="image/x-icon" href=".\images\Bai01.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #e8e8e8;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
            border: 3px solid #0052cc;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-bar {
            background: linear-gradient(180deg, #0078d7 0%, #004c99 100%);
            padding: 8px 15px;
            margin: -30px -30px 20px -30px;
            border-radius: 7px 7px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .title-bar h1 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-icon {
            width: 16px;
            height: 16px;
            background: white;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .window-controls {
            display: flex;
            gap: 5px;
        }

        .window-btn {
            width: 24px;
            height: 20px;
            background: #0078d7;
            border: 1px solid white;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-btn:hover {
            background: #1084d8;
        }

        .window-btn.close {
            background: #e81123;
        }

        .window-btn.close:hover {
            background: #f1233a;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #999;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #0066cc;
            font-size: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .checkbox-group, .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-item, .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .checkbox-item:hover, .radio-item:hover {
            background: #f0f0f0;
        }

        input[type="checkbox"], input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        label {
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            color: #333;
        }

        .submit-btn {
            display: block;
            margin: 0 auto;
            padding: 10px 40px;
            background: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .submit-btn:hover {
            background: #e0e0e0;
            border-color: #666;
        }

        .submit-btn:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #e8e8e8;
            border-radius: 10px;
            border: 3px solid #0052cc;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(180deg, #0078d7 0%, #004c99 100%);
            padding: 8px 15px;
            border-radius: 7px 7px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 24px;
            height: 20px;
            background: #e81123;
            border: 1px solid white;
            border-radius: 2px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #f1233a;
        }

        .modal-body {
            padding: 20px;
            background: white;
            margin: 15px;
            border-radius: 5px;
            border: 2px solid #999;
        }

        .modal-body p {
            margin: 10px 0;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .modal-body strong {
            color: #0066cc;
        }

        .modal-footer {
            padding: 15px;
            text-align: center;
        }

        .ok-btn {
            padding: 8px 40px;
            background: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .ok-btn:hover {
            background: #e0e0e0;
            border-color: #666;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-bar">
            <h1><span class="window-icon"></span> Sở thích cá nhân</h1>
            <div class="window-controls">
                <div class="window-btn">_</div>
                <div class="window-btn">□</div>
                <div class="window-btn close">✕</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-title">Sở thích của bạn</div>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby1" value="Du lịch">
                        <label for="hobby1">Du lịch</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby2" value="Nghe nhạc">
                        <label for="hobby2">Nghe nhạc</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby3" value="Mua sắm">
                        <label for="hobby3">Mua sắm</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby4" value="Xem phim">
                        <label for="hobby4">Xem phim</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby5" value="Thể thao">
                        <label for="hobby5">Thể thao</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="hobby6" value="Đọc sách">
                        <label for="hobby6">Đọc sách</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Bạn thích màu gì nhất</div>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="color1" name="color" value="Trắng">
                        <label for="color1">Trắng</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="color2" name="color" value="Đỏ">
                        <label for="color2">Đỏ</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="color3" name="color" value="Đen">
                        <label for="color3">Đen</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="color4" name="color" value="Tím">
                        <label for="color4">Tím</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="color5" name="color" value="Xanh">
                        <label for="color5">Xanh</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="color6" name="color" value="Vàng">
                        <label for="color6">Vàng</label>
                    </div>
                </div>
            </div>
        </div>

        <button class="submit-btn" onclick="showInfo()">Thông tin bạn chọn</button>
    </div>

    <!-- Modal hiển thị thông tin -->
    <div class="modal" id="infoModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Sở thích cá nhân</div>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="ok-btn" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        function showInfo() {
            // Lấy các sở thích đã chọn
            const hobbies = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                hobbies.push(checkbox.value);
            });

            // Lấy màu đã chọn
            const colorRadio = document.querySelector('input[name="color"]:checked');
            const selectedColor = colorRadio ? colorRadio.value : null;

            // Kiểm tra xem có chọn gì không
            if (hobbies.length === 0 && !selectedColor) {
                alert('Vui lòng chọn ít nhất một sở thích hoặc màu yêu thích!');
                return;
            }

            // Tạo nội dung hiển thị
            let content = '';

            if (hobbies.length > 0) {
                content += `<p><strong>Sở thích của bạn là:</strong> ${hobbies.join(', ')}</p>`;
            } else {
                content += `<p><strong>Sở thích của bạn là:</strong> (Chưa chọn)</p>`;
            }

            if (selectedColor) {
                content += `<p><strong>Màu bạn thích nhất là:</strong> ${selectedColor}</p>`;
            } else {
                content += `<p><strong>Màu bạn thích nhất là:</strong> (Chưa chọn)</p>`;
            }

            // Hiển thị modal
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('infoModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.remove('show');
        }

        // Đóng modal khi click bên ngoài
        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
