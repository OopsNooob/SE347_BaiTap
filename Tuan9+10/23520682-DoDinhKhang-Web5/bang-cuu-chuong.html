<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Bảng Cửu Chương</title>
    <link rel="icon" type="image/x-icon" href=".\images\Bai01.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #cfe2ff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #1565c0;
            padding: 20px;
            border-radius: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #01579b;
            font-weight: 600;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #0277bd;
            border-radius: 8px;
            font-size: 18px;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #01579b;
            box-shadow: 0 0 0 3px rgba(1, 87, 155, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #d7ccc8;
            color: #3e2723;
            border: 2px solid #8d6e63;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #bcaaa4;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .result-section {
            margin-top: 30px;
        }

        .result-title {
            text-align: center;
            color: #c62828;
            font-size: 1.8em;
            margin-bottom: 20px;
            font-style: italic;
            font-weight: 700;
        }

        .multiplication-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .multiplication-table {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #1976d2;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        .table-title {
            text-align: center;
            color: #1565c0;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1976d2;
        }

        .multiplication-row {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            font-size: 16px;
            color: #424242;
            font-weight: 500;
            transition: all 0.3s;
        }

        .multiplication-row:hover {
            background: #fff9c4;
            transform: translateX(5px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .multiplication-row .number {
            color: #1976d2;
            font-weight: 700;
        }

        .multiplication-row .result {
            color: #c62828;
            font-weight: 700;
        }

        .info-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border-left: 5px solid #1976d2;
        }

        .info-section h3 {
            color: #1976d2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .info-section p {
            color: #555;
            line-height: 1.8;
            margin: 5px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border: 2px solid #1976d2;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #1976d2;
            font-size: 24px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .multiplication-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
            }

            .input-section, button, .info-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>In Bảng Cửu Chương</h1>
        
        <div class="input-section">
            <div class="input-group">
                <label for="startNum">Bắt đầu từ:</label>
                <input type="number" id="startNum" value="7" min="1" max="12">
            </div>

            <div class="input-group">
                <label for="endNum">Kết thúc tại:</label>
                <input type="number" id="endNum" value="10" min="1" max="12">
            </div>
        </div>

        <button onclick="generateTables()">In bảng cửu chương</button>

        <div id="resultSection"></div>

        <div class="info-section">
            <h3>📚 Hướng Dẫn</h3>
            <p><strong>• Bắt đầu từ:</strong> Nhập số bảng cửu chương bắt đầu (1-12)</p>
            <p><strong>• Kết thúc tại:</strong> Nhập số bảng cửu chương kết thúc (1-12)</p>
            <p><strong>• Mỗi bảng:</strong> Nhân từ 1 đến 10</p>
            <p><strong>💡 Ví dụ:</strong> Từ 7 đến 10 sẽ in bảng cửu chương 7, 8, 9, 10</p>
        </div>
    </div>

    <script>
        function generateTables() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value);

            // Kiểm tra đầu vào
            if (isNaN(start) || isNaN(end)) {
                alert('Vui lòng nhập số hợp lệ!');
                return;
            }

            if (start < 1 || start > 12 || end < 1 || end > 12) {
                alert('Số phải nằm trong khoảng 1-12!');
                return;
            }

            if (start > end) {
                alert('Số bắt đầu phải nhỏ hơn hoặc bằng số kết thúc!');
                return;
            }

            // Tạo HTML cho kết quả
            let html = `
                <div class="result-section">
                    <h2 class="result-title">Kết quả sau khi nhấn <em>In bảng cửu chương</em></h2>
                    <div class="multiplication-grid">
            `;

            // Tạo từng bảng cửu chương
            for (let num = start; num <= end; num++) {
                html += `
                    <div class="multiplication-table">
                        <div class="table-title">Bảng ${num}</div>
                `;

                // Tạo các phép nhân từ 1 đến 10
                for (let i = 1; i <= 10; i++) {
                    const result = num * i;
                    html += `
                        <div class="multiplication-row">
                            <span class="number">${num}</span> x 
                            <span class="number">${i}</span> = 
                            <span class="result">${result}</span>
                        </div>
                    `;
                }

                html += `</div>`;
            }

            html += `
                    </div>
                </div>
            `;

            // Thống kê
            const totalTables = end - start + 1;
            const totalRows = totalTables * 10;
            
            html += `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Số bảng cửu chương</div>
                        <div class="stat-value">${totalTables}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Tổng số phép tính</div>
                        <div class="stat-value">${totalRows}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Từ bảng</div>
                        <div class="stat-value">${start}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Đến bảng</div>
                        <div class="stat-value">${end}</div>
                    </div>
                </div>
            `;

            // Hiển thị kết quả
            document.getElementById('resultSection').innerHTML = html;

            // Scroll to result
            document.getElementById('resultSection').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        // Cho phép nhấn Enter để tính
        document.getElementById('endNum').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                generateTables();
            }
        });

        // Tự động tạo bảng khi load trang
        window.onload = function() {
            generateTables();
        };
    </script>
</body>
</html>
