<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Tiền</title>
    <link rel="icon" type="image/x-icon" href=".\images\Bai01.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #d6d6d6;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
            border: 3px solid #0052cc;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-bar {
            background: linear-gradient(180deg, #0078d7 0%, #004c99 100%);
            padding: 8px 15px;
            margin: -30px -30px 20px -30px;
            border-radius: 7px 7px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .title-bar h1 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-icon {
            width: 16px;
            height: 16px;
            background: white;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .window-controls {
            display: flex;
            gap: 5px;
        }

        .window-btn {
            width: 24px;
            height: 20px;
            background: #0078d7;
            border: 1px solid white;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-btn:hover {
            background: #1084d8;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: start;
        }

        .section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #999;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .menu-list, .selected-list {
            border: 2px solid #7b7b7b;
            background: white;
            min-height: 200px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            border-radius: 4px;
        }

        .menu-item {
            padding: 8px 10px;
            cursor: pointer;
            user-select: none;
            border-radius: 3px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .menu-item:hover {
            background: #e3f2fd;
        }

        .menu-item.selected {
            background: #0078d7;
            color: white;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            width: 60px;
            height: 35px;
            background: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .control-btn:hover {
            background: #e0e0e0;
            border-color: #666;
        }

        .control-btn:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calculate-btn {
            padding: 10px 30px;
            background: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .calculate-btn:hover {
            background: #e0e0e0;
            border-color: #666;
        }

        .total-display {
            color: #0066cc;
            font-size: 15px;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #d6d6d6;
            border-radius: 10px;
            border: 3px solid #0052cc;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(180deg, #0078d7 0%, #004c99 100%);
            padding: 8px 15px;
            border-radius: 7px 7px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 24px;
            height: 20px;
            background: #e81123;
            border: 1px solid white;
            border-radius: 2px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #f1233a;
        }

        .modal-body {
            padding: 20px;
            background: white;
            margin: 15px;
            border-radius: 5px;
            border: 2px solid #999;
        }

        .modal-body h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .receipt-item:last-child {
            border-bottom: none;
        }

        .receipt-name {
            color: #333;
        }

        .receipt-price {
            color: #333;
            font-weight: 600;
        }

        .modal-footer {
            padding: 15px;
            text-align: center;
        }

        .ok-btn {
            padding: 8px 40px;
            background: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .ok-btn:hover {
            background: #e0e0e0;
            border-color: #666;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-bar">
            <h1><span class="window-icon"></span> Tính tiền</h1>
            <div class="window-controls">
                <div class="window-btn">_</div>
                <div class="window-btn">□</div>
                <div class="window-btn">✕</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-title">Thực đơn tiệc</div>
                <div class="menu-list" id="menuList"></div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="moveSelected()" title="Chuyển món đã chọn sang danh sách">›</button>
                <button class="control-btn" onclick="moveAll()" title="Chuyển tất cả sang danh sách">››</button>
                <button class="control-btn" onclick="removeSelected()" title="Xóa món đã chọn khỏi danh sách">‹</button>
                <button class="control-btn" onclick="removeAll()" title="Xóa tất cả khỏi danh sách">‹‹</button>
            </div>

            <div class="section">
                <div class="section-title">Danh sách món ăn chọn</div>
                <div class="selected-list" id="selectedList"></div>
            </div>
        </div>

        <div class="footer">
            <button class="calculate-btn" onclick="calculateTotal()">Tính tiền</button>
            <div class="total-display" id="totalDisplay">Số tiền cần thanh toán là là ...</div>
        </div>
    </div>

    <!-- Modal hiển thị chi tiết -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Chi tiết đơn giá các món ăn:</div>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="ok-btn" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

<script>
    // Dữ liệu thực đơn với giá
    const menuData = [
        { name: 'Bò nấu dầu Hà Lan', price: 150000 },
        { name: 'Chả giò tôm', price: 100000 },
        { name: 'Chè hạt sen', price: 100000 },
        { name: 'Cơm đường cháu', price: 100000 },
        { name: 'Gỏi ngó sen', price: 100000 },
        { name: 'Lẩu cá điêu hồng', price: 200000 },
        { name: 'Lẩu Thái Lan', price: 180000 },
        { name: 'Gà hấp chao', price: 120000 },
        { name: 'Heo sữa quay', price: 250000 },
        { name: 'Khai vị', price: 80000 },
        { name: 'Lẩu hải sản', price: 220000 },
        { name: 'Trái cây', price: 60000 }
    ];

    let selectedMenuItems = [];
    let selectedOrderItems = [];

    // Khởi tạo danh sách thực đơn
    function initMenu() {
        const menuList = document.getElementById('menuList');
        menuData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.textContent = item.name;
            div.dataset.index = index;
            div.onclick = function() {
                toggleMenuSelection(this);
            };
            menuList.appendChild(div);
        });
    }

    // Toggle selection trong menu
    function toggleMenuSelection(element) {
        element.classList.toggle('selected');
    }

    // Toggle selection trong danh sách đã chọn
    function toggleOrderSelection(element) {
        element.classList.toggle('selected');
    }

    // Chuyển món đã chọn sang danh sách
    function moveSelected() {
        const menuItems = document.querySelectorAll('#menuList .menu-item.selected');
        const selectedList = document.getElementById('selectedList');

        menuItems.forEach(item => {
            const index = parseInt(item.dataset.index);
            const menuItem = menuData[index];
            
            // Kiểm tra xem món đã có trong danh sách chưa
            const exists = Array.from(selectedList.children).some(
                child => child.dataset.index === item.dataset.index
            );

            if (!exists) {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.textContent = menuItem.name;
                div.dataset.index = index;
                div.onclick = function() {
                    toggleOrderSelection(this);
                };
                selectedList.appendChild(div);
                
                // Ẩn món trong thực đơn
                item.style.display = 'none';
            }

            item.classList.remove('selected');
        });

        updateTotal();
    }

    // Chuyển tất cả sang danh sách
    function moveAll() {
        const selectedList = document.getElementById('selectedList');
        const menuList = document.getElementById('menuList');
        selectedList.innerHTML = '';

        menuData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.textContent = item.name;
            div.dataset.index = index;
            div.onclick = function() {
                toggleOrderSelection(this);
            };
            selectedList.appendChild(div);
        });

        // Ẩn tất cả món trong thực đơn
        document.querySelectorAll('#menuList .menu-item').forEach(item => {
            item.classList.remove('selected');
            item.style.display = 'none';
        });

        updateTotal();
    }

    // Xóa món đã chọn khỏi danh sách
    function removeSelected() {
        const selectedItems = document.querySelectorAll('#selectedList .menu-item.selected');
        
        selectedItems.forEach(item => {
            const index = parseInt(item.dataset.index);
            
            // Hiện lại món trong thực đơn
            const menuItem = document.querySelector(`#menuList .menu-item[data-index="${index}"]`);
            if (menuItem) {
                menuItem.style.display = 'block';
            }
            
            item.remove();
        });
        
        updateTotal();
    }

    // Xóa tất cả khỏi danh sách
    function removeAll() {
        // Hiện lại tất cả món trong thực đơn
        document.querySelectorAll('#menuList .menu-item').forEach(item => {
            item.style.display = 'block';
        });
        
        document.getElementById('selectedList').innerHTML = '';
        updateTotal();
    }

    // Cập nhật tổng tiền
    function updateTotal() {
        const selectedItems = document.querySelectorAll('#selectedList .menu-item');
        let total = 0;

        selectedItems.forEach(item => {
            const index = parseInt(item.dataset.index);
            total += menuData[index].price;
        });

        const totalDisplay = document.getElementById('totalDisplay');
        if (selectedItems.length === 0) {
            totalDisplay.textContent = 'Số tiền cần thanh toán là là ...';
        } else {
            totalDisplay.textContent = `Số tiền cần thanh toán là là ${total.toLocaleString()} đồng`;
        }
    }

    // Tính tiền và hiển thị chi tiết
    function calculateTotal() {
        const selectedItems = document.querySelectorAll('#selectedList .menu-item');
        
        if (selectedItems.length === 0) {
            alert('Vui lòng chọn món ăn!');
            return;
        }

        let total = 0;
        let html = '<h3>Chi tiết đơn giá các món ăn:</h3>';

        selectedItems.forEach(item => {
            const index = parseInt(item.dataset.index);
            const menuItem = menuData[index];
            total += menuItem.price;

            html += `
                <div class="receipt-item">
                    <span class="receipt-name">${menuItem.name}</span>
                    <span class="receipt-price">${menuItem.price.toLocaleString()}</span>
                </div>
            `;
        });

        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('detailModal').classList.add('show');
    }

    // Đóng modal
    function closeModal() {
        document.getElementById('detailModal').classList.remove('show');
    }

    // Đóng modal khi click bên ngoài
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    // Khởi tạo khi load trang
    window.onload = function() {
        initMenu();
    };
</script>
</body>
</html>
