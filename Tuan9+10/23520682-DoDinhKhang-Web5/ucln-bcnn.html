<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm ƯCLN và BCNN</title>
    <link rel="icon" type="image/x-icon" href=".\images\Bai01.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #0083b0;
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0083b0;
            box-shadow: 0 0 0 3px rgba(0, 131, 176, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 131, 176, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            border-left: 5px solid #0083b0;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .result h3 {
            color: #0083b0;
            margin-bottom: 15px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .result-label {
            font-weight: 600;
            color: #555;
            font-size: 16px;
        }

        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #0083b0;
        }

        .error {
            margin-top: 30px;
            padding: 20px;
            background: #ffe6e6;
            border-radius: 10px;
            border-left: 5px solid #e74c3c;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error h3 {
            color: #e74c3c;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error p {
            color: #c0392b;
            font-size: 16px;
        }

        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #2196f3;
        }

        .info-box h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        .steps {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .steps h4 {
            color: #0083b0;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .steps ol {
            padding-left: 20px;
            color: #666;
        }

        .steps li {
            margin: 5px 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 ƯCLN & BCNN</h1>
        <p class="subtitle">Tìm Ước Số Chung Lớn Nhất và Bội Số Chung Nhỏ Nhất</p>
        
        <form onsubmit="calculate(event)">
            <div class="form-group">
                <label for="number1">Nhập số thứ nhất:</label>
                <input type="number" id="number1" placeholder="Ví dụ: 12" required>
            </div>
            
            <div class="form-group">
                <label for="number2">Nhập số thứ hai:</label>
                <input type="number" id="number2" placeholder="Ví dụ: 18" required>
            </div>
            
            <button type="submit">Tính Toán</button>
        </form>

        <div id="result"></div>

        <div class="info-box">
            <h4>📚 Thông Tin:</h4>
            <p><strong>ƯCLN (GCD):</strong> Ước số chung lớn nhất là số lớn nhất có thể chia hết cho cả hai số.</p>
            <p><strong>BCNN (LCM):</strong> Bội số chung nhỏ nhất là số nhỏ nhất có thể chia hết cho cả hai số.</p>
        </div>
    </div>

    <script>
        // Tính ƯCLN bằng thuật toán Euclid
        function findGCD(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            
            while (b !== 0) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        // Tính BCNN
        function findLCM(a, b, gcd) {
            return Math.abs(a * b) / gcd;
        }

        // Tìm các bước tính ƯCLN (thuật toán Euclid)
        function getGCDSteps(a, b) {
            let steps = [];
            a = Math.abs(a);
            b = Math.abs(b);
            
            while (b !== 0) {
                steps.push(`${a} = ${b} × ${Math.floor(a / b)} + ${a % b}`);
                let temp = b;
                b = a % b;
                a = temp;
            }
            return steps;
        }

        // Xử lý form
        function calculate(event) {
            event.preventDefault();
            
            const num1 = parseInt(document.getElementById('number1').value);
            const num2 = parseInt(document.getElementById('number2').value);
            const resultDiv = document.getElementById('result');
            
            // Kiểm tra đầu vào
            if (num1 === 0 && num2 === 0) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Lỗi</h3>
                        <p>Không thể tính ƯCLN và BCNN của hai số 0!</p>
                    </div>
                `;
                return;
            }
            
            if (num1 === 0 || num2 === 0) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>⚠️ Cảnh báo</h3>
                        <p>Khi một trong hai số bằng 0:</p>
                        <p>• ƯCLN = ${Math.abs(num1 + num2)}</p>
                        <p>• BCNN không xác định (hoặc bằng 0)</p>
                    </div>
                `;
                return;
            }
            
            // Tính toán
            const gcd = findGCD(num1, num2);
            const lcm = findLCM(num1, num2, gcd);
            const steps = getGCDSteps(num1, num2);
            
            // Hiển thị kết quả
            resultDiv.innerHTML = `
                <div class="result">
                    <h3>✅ Kết Quả</h3>
                    
                    <div class="result-item">
                        <span class="result-label">Số thứ nhất:</span>
                        <span class="result-value">${num1}</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Số thứ hai:</span>
                        <span class="result-value">${num2}</span>
                    </div>
                    
                    <div class="result-item" style="background: #e8f5e9;">
                        <span class="result-label">ƯCLN (GCD):</span>
                        <span class="result-value" style="color: #2e7d32;">${gcd}</span>
                    </div>
                    
                    <div class="result-item" style="background: #e3f2fd;">
                        <span class="result-label">BCNN (LCM):</span>
                        <span class="result-value" style="color: #1565c0;">${lcm}</span>
                    </div>
                    
                    <div class="steps">
                        <h4>🔍 Các bước tính ƯCLN (Thuật toán Euclid):</h4>
                        <ol>
                            ${steps.map(step => `<li>${step}</li>`).join('')}
                            <li><strong>ƯCLN = ${gcd}</strong></li>
                        </ol>
                        <p style="margin-top: 10px; color: #666;">
                            <strong>Công thức BCNN:</strong> LCM(a, b) = |a × b| / GCD(a, b) = ${Math.abs(num1 * num2)} / ${gcd} = ${lcm}
                        </p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
